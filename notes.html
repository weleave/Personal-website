<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="weleave 的学习笔记页。" />
    <title>weleave | 学习笔记</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+QingKe+HuangYou&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="cursor-orb"></div>
    <div class="page-wipe" id="page-wipe"></div>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" data-transition>weleave</a>
        <nav class="nav-links">
          <a class="nav-link" data-page="index.html" href="./index.html" data-transition>主页</a>
          <a class="nav-link" data-page="skills.html" href="./skills.html" data-transition>技能站</a>
          <a class="nav-link" data-page="projects.html" href="./projects.html" data-transition>项目库</a>
          <a class="nav-link" data-page="notes.html" href="./notes.html" data-transition>笔记页</a>
          <a class="nav-link" data-page="archive.html" href="./archive.html" data-transition>时间轴</a>
          <a class="nav-link" data-page="playground.html" href="./playground.html" data-transition>游乐场</a>
          <a class="nav-link" data-page="contact.html" href="./contact.html" data-transition>联系</a>
        </nav>
        <div class="top-tools">
          <div class="theme-switcher">
            <button class="theme-dot" type="button" data-theme="default" aria-label="默认主题"></button>
            <button class="theme-dot" type="button" data-theme="ocean" aria-label="海洋主题"></button>
            <button class="theme-dot" type="button" data-theme="sunset" aria-label="暖阳主题"></button>
          </div>
          <a class="btn small ghost" href="./archive.html" data-transition>看时间轴</a>
        </div>
      </header>

      <main>
        <section class="section glass" data-reveal>
          <p class="eyebrow">学习笔记页面</p>
          <h2>学习笔记库</h2>
          <p>记录阶段学习内容，支持关键字检索、状态筛选、分类筛选和数据导入导出。</p>
        </section>

        <section class="section glass" id="notes-board-root" data-reveal>
          <h2>笔记列表</h2>
          <div class="filter-bar">
            <input id="note-search-input" class="editor-input filter-field" type="text" placeholder="搜索标题、分类、摘要关键字" />
            <select id="note-status-filter" class="editor-select filter-field">
              <option value="全部">全部状态</option>
              <option value="进行中">进行中</option>
              <option value="已完成">已完成</option>
              <option value="计划中">计划中</option>
            </select>
            <input id="note-category-filter" class="editor-input filter-field" type="text" placeholder="按分类筛选，例如：并发 / CMake" />
          </div>
          <div class="notes-grid" id="notes-list"></div>
          <div class="editor-toolbar">
            <button type="button" class="btn small" id="notes-edit-toggle">开启编辑</button>
            <button type="button" class="btn small ghost is-hidden" id="notes-reset-btn">恢复默认</button>
            <button type="button" class="btn small ghost" id="notes-export-btn">导出数据</button>
            <button type="button" class="btn small ghost" id="notes-import-btn">导入数据</button>
            <input id="notes-import-input" type="file" accept="application/json" class="is-hidden" />
          </div>
          <div class="editor-panel is-hidden" id="notes-editor-panel">
            <p>填写学习记录后点击“新增笔记”。</p>
            <div class="editor-row">
              <input type="text" class="editor-input" id="note-title-input" placeholder="笔记标题（必填）" maxlength="80" />
              <input type="text" class="editor-input" id="note-category-input" placeholder="分类（例如：并发 / 工具链）" maxlength="30" />
            </div>
            <div class="editor-row">
              <input type="date" class="editor-input" id="note-date-input" />
              <select class="editor-select" id="note-status-input">
                <option value="进行中">进行中</option>
                <option value="已完成">已完成</option>
                <option value="计划中">计划中</option>
              </select>
            </div>
            <div class="editor-row">
              <textarea class="editor-textarea" id="note-summary-input" placeholder="学习摘要（必填）"></textarea>
            </div>
            <div class="editor-row">
              <button type="button" class="btn small alt" id="note-add-btn">新增笔记</button>
            </div>
          </div>
          <div class="status-text" id="notes-status">浏览模式</div>
        </section>
      </main>

      <footer class="footer">
        <p>&copy; <span id="year"></span> weleave · 学习笔记页</p>
      </footer>
    </div>
    <button id="back-top-btn" class="back-top is-hidden" type="button" aria-label="返回顶部">↑</button>
    <div id="toast" class="toast"></div>
    <script src="./script.js"></script>
  </body>
</html>
