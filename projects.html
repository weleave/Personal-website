<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="weleave 的项目库：支持搜索、状态筛选和技术标签多选过滤。" />
    <title>weleave | 项目库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+QingKe+HuangYou&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="cursor-orb"></div>
    <div class="page-wipe" id="page-wipe"></div>

    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" data-transition>weleave</a>
        <nav class="nav-links">
          <a class="nav-link" data-page="index.html" href="./index.html" data-transition>主页</a>
          <a class="nav-link" data-page="skills.html" href="./skills.html" data-transition>技能站</a>
          <a class="nav-link" data-page="projects.html" href="./projects.html" data-transition>项目库</a>
          <a class="nav-link" data-page="notes.html" href="./notes.html" data-transition>笔记页</a>
          <a class="nav-link" data-page="archive.html" href="./archive.html" data-transition>时间轴</a>
          <a class="nav-link" data-page="playground.html" href="./playground.html" data-transition>游乐场</a>
          <a class="nav-link" data-page="contact.html" href="./contact.html" data-transition>联系</a>
        </nav>
        <div class="top-tools">
          <div class="theme-switcher">
            <button class="theme-dot" type="button" data-theme="default" aria-label="默认主题"></button>
            <button class="theme-dot" type="button" data-theme="ocean" aria-label="海洋主题"></button>
            <button class="theme-dot" type="button" data-theme="sunset" aria-label="暖阳主题"></button>
          </div>
          <a class="btn small ghost" href="./archive.html" data-transition>看归档</a>
        </div>
      </header>

      <main>
        <section class="section glass" data-reveal>
          <p class="eyebrow">项目页面</p>
          <h2>项目库</h2>
          <p>这里记录我的工程实践。可以按关键词、状态和多个技术标签组合过滤项目。</p>
        </section>

        <section class="section glass" id="projects-editor-root" data-reveal>
          <h2>项目展示</h2>
          <div class="filter-bar">
            <input id="project-search-input" class="editor-input filter-field" type="text" placeholder="搜索项目名称、标签、描述关键字" />
            <select id="project-filter-select" class="editor-select filter-field">
              <option value="全部">全部状态</option>
              <option value="进行中">进行中</option>
              <option value="已完成">已完成</option>
              <option value="计划中">计划中</option>
            </select>
          </div>
          <div class="tag-filter" id="project-tag-filter" aria-label="技术标签过滤"></div>
          <div class="project-grid" id="projects-list"></div>

          <div class="editor-toolbar">
            <button type="button" class="btn small" id="projects-edit-toggle">开启编辑</button>
            <button type="button" class="btn small ghost is-hidden" id="projects-reset-btn">恢复默认</button>
            <button type="button" class="btn small ghost" id="projects-export-btn">导出数据</button>
            <button type="button" class="btn small ghost" id="projects-import-btn">导入数据</button>
            <input id="projects-import-input" type="file" accept="application/json" class="is-hidden" />
          </div>

          <div class="editor-panel is-hidden" id="projects-editor-panel">
            <p>填写项目信息后可新增，技术标签用英文逗号分隔，项目亮点每行一条。</p>
            <div class="editor-row">
              <input type="text" class="editor-input" id="project-title-input" placeholder="项目名称（必填）" maxlength="60" />
              <input type="text" class="editor-input" id="project-period-input" placeholder="时间（例如：2026.04 - 2026.06）" maxlength="40" />
            </div>
            <div class="editor-row">
              <input type="text" class="editor-input" id="project-role-input" placeholder="身份（例如：个人项目）" maxlength="40" />
              <select class="editor-select" id="project-status-input">
                <option value="进行中">进行中</option>
                <option value="已完成">已完成</option>
                <option value="计划中">计划中</option>
              </select>
            </div>
            <div class="editor-row">
              <input type="text" class="editor-input" id="project-tags-input" placeholder="标签，例如：C++,并发,工程化" />
              <input type="text" class="editor-input" id="project-link-input" placeholder="仓库链接（可选）" maxlength="200" />
            </div>
            <div class="editor-row">
              <textarea class="editor-textarea" id="project-bullets-input" placeholder="项目亮点，每行一条（至少一条）"></textarea>
            </div>
            <div class="editor-row">
              <button type="button" class="btn small alt" id="project-add-btn">新增项目</button>
            </div>
          </div>

          <div class="status-text" id="projects-status">浏览模式</div>
        </section>
      </main>

      <footer class="footer">
        <p>&copy; <span id="year"></span> weleave · 项目库</p>
      </footer>
    </div>

    <button id="back-top-btn" class="back-top is-hidden" type="button" aria-label="返回顶部">↑</button>
    <div id="toast" class="toast"></div>
    <script src="./script.js"></script>
  </body>
</html>
