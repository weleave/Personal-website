<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="weleave 的联系页。" />
    <title>weleave | 联系</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+QingKe+HuangYou&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="cursor-orb"></div>
    <div class="page-wipe" id="page-wipe"></div>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" data-transition>weleave</a>
        <nav class="nav-links">
          <a class="nav-link" data-page="index.html" href="./index.html" data-transition>主页</a>
          <a class="nav-link" data-page="skills.html" href="./skills.html" data-transition>技能站</a>
          <a class="nav-link" data-page="projects.html" href="./projects.html" data-transition>项目库</a>
          <a class="nav-link" data-page="notes.html" href="./notes.html" data-transition>笔记页</a>
          <a class="nav-link" data-page="archive.html" href="./archive.html" data-transition>时间轴</a>
          <a class="nav-link" data-page="playground.html" href="./playground.html" data-transition>游乐场</a>
          <a class="nav-link" data-page="contact.html" href="./contact.html" data-transition>联系</a>
        </nav>
        <div class="top-tools">
          <div class="theme-switcher">
            <button class="theme-dot" type="button" data-theme="default" aria-label="默认主题"></button>
            <button class="theme-dot" type="button" data-theme="ocean" aria-label="海洋主题"></button>
            <button class="theme-dot" type="button" data-theme="sunset" aria-label="暖阳主题"></button>
          </div>
          <a class="btn small ghost" href="./index.html" data-transition>返回首页</a>
        </div>
      </header>

      <main>
        <section class="section glass" data-reveal>
          <p class="eyebrow">联系页面</p>
          <h2>联系我</h2>
          <p>欢迎交流 C++、并发实践、项目实现思路和学习路径。</p>
        </section>

        <section class="section glass" data-reveal>
          <h2>联系渠道</h2>
          <div class="contact-grid">
            <article class="contact-card">
              <h3>GitHub</h3>
              <p>项目代码和更新动态会优先放在这里。</p>
              <p><a href="https://github.com/weleave" target="_blank" rel="noopener">github.com/weleave</a></p>
            </article>
            <article class="contact-card">
              <h3>邮箱</h3>
              <p>如果你想交流项目细节，可以通过邮件联系我。</p>
              <p><a href="mailto:hello@mail.com">hello@mail.com</a></p>
              <div class="editor-toolbar" style="margin-top: 10px">
                <button type="button" class="btn small ghost" data-copy-text="hello@mail.com">复制邮箱</button>
              </div>
            </article>
            <article class="contact-card">
              <h3>城市</h3>
              <p>西安市</p>
              <p>线上或线下交流都可以。</p>
            </article>
            <article class="contact-card">
              <h3>合作方向</h3>
              <p>C++ 工程实践、并发系统、学习型项目共建。</p>
              <p><a href="./projects.html" data-transition>查看项目库</a></p>
            </article>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>&copy; <span id="year"></span> weleave · 联系页</p>
      </footer>
    </div>
    <button id="back-top-btn" class="back-top is-hidden" type="button" aria-label="返回顶部">↑</button>
    <div id="toast" class="toast"></div>
    <script src="./script.js"></script>
  </body>
</html>
